<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-container">

    <header>
      <h1>💸 Budget Tracker</h1>
      <button id="theme-toggle" aria-label="Toggle dark/light mode">🌙</button>
    </header>

    <!-- Balance -->
    <section class="balance-card">
      <p class="balance-label">Total Spent</p>
      <h2 id="total-balance">$0.00</h2>
      <div class="limit-row">
        <label for="spend-limit">Spending Limit: $</label>
        <input type="number" id="spend-limit" placeholder="e.g. 500" min="0" />
      </div>
    </section>

    <!-- Add Transaction Form -->
    <section class="card">
      <h3>Add Transaction</h3>
      <form id="transaction-form">
        <div class="form-group">
          <label for="item-name">Item Name</label>
          <input type="text" id="item-name" placeholder="e.g. Coffee" />
        </div>
        <div class="form-group">
          <label for="amount">Amount ($)</label>
          <input type="number" id="amount" placeholder="e.g. 4.50" min="0.01" step="0.01" />
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <div class="category-row">
            <select id="category">
              <option value="">Select category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
            <button type="button" id="add-category-btn" title="Add custom category">+</button>
          </div>
          <div id="custom-category-input" class="hidden">
            <input type="text" id="custom-category" placeholder="New category name" />
            <button type="button" id="save-category-btn">Save</button>
          </div>
        </div>
        <p id="form-error" class="error hidden"></p>
        <button type="submit" class="btn-primary">Add Transaction</button>
      </form>
    </section>

    <!-- Chart -->
    <section class="card">
      <h3>Spending by Category</h3>
      <div class="chart-wrapper">
        <canvas id="spending-chart"></canvas>
        <p id="chart-empty" class="empty-msg">No transactions yet.</p>
      </div>
    </section>

    <!-- Transaction List -->
    <section class="card">
      <div class="list-header">
        <h3>Transactions</h3>
        <div class="sort-row">
          <label for="sort-select">Sort by:</label>
          <select id="sort-select">
            <option value="date-desc">Newest</option>
            <option value="date-asc">Oldest</option>
            <option value="amount-desc">Amount ↓</option>
            <option value="amount-asc">Amount ↑</option>
            <option value="category">Category</option>
          </select>
        </div>
      </div>
      <ul id="transaction-list">
        <li class="empty-msg" id="list-empty">No transactions yet.</li>
      </ul>
    </section>

  </div>
  <script src="js/app.js"></script>
</body>
</html>
